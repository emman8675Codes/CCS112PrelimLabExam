<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student & Loan Management System</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <div class="container">
        <h2>Student Management System</h2>

        <!-- Student Section -->
        <section id="student-section">
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="text" id="course" placeholder="Course" required>
                <button type="submit" id="submitBtn">Add Student</button>
                <button type="button" id="cancelBtn" class="cancel" style="display:none;"
                    onclick="resetForm()">Cancel</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </section>

        <!-- Dynamic Loan Workspace -->
        <section id="loan-section" class="workspace" style="display:none;">
            <button class="btn-back" onclick="showStudentSection()">← Back to Students</button>
            <h3 id="loan-workspace-title">Loans for Student</h3>

            <form id="loanForm">
                <input type="hidden" id="loanStudentId">
                <input type="number" step="0.01" id="loanAmount" placeholder="Amount" required>
                <select id="loanType" required>
                    <option value="">Select Type</option>
                    <option value="Tuition">Tuition</option>
                    <option value="Books">Books</option>
                    <option value="Living Expenses">Living Expenses</option>
                </select>
                <select id="loanStatus" required>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Disbursed">Disbursed</option>
                </select>
                <button type="submit">Add Loan</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Loan ID</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="loanTableBody"></tbody>
            </table>
        </section>

        <!-- Dynamic Payment Workspace -->
        <section id="payment-section" class="workspace" style="display:none;">
            <button class="btn-back" onclick="showLoanSection()">← Back to Loans</button>
            <h3 id="payment-workspace-title">Payments for Loan</h3>

            <div class="summary-cards">
                <div class="card">Total Paid: <span id="totalPaid">$0.00</span></div>
                <div class="card">Remaining Balance: <span id="remainingBalance">$0.00</span></div>
            </div>

            <form id="paymentForm">
                <input type="hidden" id="paymentLoanId">
                <input type="number" step="0.01" id="paymentAmount" placeholder="Payment Amount" required>
                <input type="date" id="paymentDate" required>
                <select id="paymentMethod" required>
                    <option value="">Select Method</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Online Payment">Online Payment</option>
                </select>
                <button type="submit">Record Payment</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Payment ID</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Method</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody"></tbody>
            </table>
        </section>
    </div>

    <script src="app/app.js"></script>
    <script src="app/loans.js"></script>
    <script src="app/payments.js"></script>
</body>

</html>
